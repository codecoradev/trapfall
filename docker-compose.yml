services:
  trapfall:
    build:
      context: .
      dockerfile: Dockerfile
    image: trapfall:local
    container_name: trapfall
    restart: unless-stopped
    ports:
      - "${TRAPFALL_PORT:-3000}:3000"
    volumes:
      - trapfall-data:/data
    environment:
      - RUST_LOG=${RUST_LOG:-trapfall=info}
    command: >
      --db /data/trapfall.db
      serve
      --listen 0.0.0.0:3000
    healthcheck:
      test: ["CMD", "trapfall", "--db", "/data/trapfall.db", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  trapfall-data:
