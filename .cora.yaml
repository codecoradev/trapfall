# Cora CLI — AI code review configuration
# https://github.com/codecoradev/cora-cli
#
# Provider: FreeModel (gpt-5.4 via api.freemodel.dev)
# API key: via CORA_API_KEY env var (Hermes injects from .env)

provider:
  provider: openai
  model: gpt-5.4
  base_url: https://api.freemodel.dev/v1

ignore:
  files:
    - "**/CHANGELOG.md"
    - "**/package-lock.json"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/dist/**"
    - "**/build/**"
    - "node_modules/**"
    - "web/build/**"
    - "web/.svelte-kit/**"

hook:
  max_diff_size: 128000
  on_violation: warn
