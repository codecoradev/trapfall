name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  cora-review:
    name: Cora Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cora
        run: curl -fsSL https://raw.githubusercontent.com/codecoradev/cora-cli/main/install.sh | sh
      - name: Run cora review
        env:
          CORA_API_KEY: ${{ secrets.CORA_API_KEY }}
        run: |
          cora review --ci --base develop --format compact --output cora-results.sarif
      - name: Check SARIF for findings
        id: sarif-check
        if: always()
        shell: bash
        run: |
          RESULTS=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('cora-results.sarif'))
              results = data.get('runs', [{}])[0].get('results', [])
              print(len(results))
          except:
              print(0)
          " 2>/dev/null || echo "0")
          echo "results=$RESULTS" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF to GitHub Code Scanning
        if: always() && steps.sarif-check.outputs.results > 0
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cora-results.sarif
          category: cora-review
