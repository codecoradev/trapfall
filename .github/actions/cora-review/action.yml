name: 'Cora AI Code Review'
description: 'Run Cora AI code review on PR diff'

inputs:
  cora-api-key:
    description: 'Cora API key'
    required: true
  cora-base-url:
    description: 'Cora API base URL'
    required: true
  base-branch:
    description: 'Base branch to compare against'
    required: false
    default: 'develop'
  format:
    description: 'Output format (compact, json, sarif)'
    required: false
    default: 'compact'

runs:
  using: 'composite'
  steps:
    - name: Install cora (with retry)
      shell: bash
      run: |
        set -e
        # Try install script with retry (up to 3 attempts)
        for i in 1 2 3; do
          echo "Attempt $i: Installing cora via curl..."
          if curl -fsSL --connect-timeout 30 --max-time 120 https://raw.githubusercontent.com/codecoradev/cora-cli/main/install.sh | sh; then
            echo "✅ cora installed successfully"
            cora --version
            exit 0
          fi
          echo "⚠️ Attempt $i failed, waiting 10s before retry..."
          sleep 10
        done

        # Fallback: install via cargo
        echo "⚠️ Curl install failed after 3 attempts. Falling back to cargo install..."
        cargo install cora-cli --version 0.4.6 --locked
        cora --version

    - name: Run cora review
      shell: bash
      env:
        CORA_API_KEY: ${{ inputs.cora-api-key }}
        CORA_BASE_URL: ${{ inputs.cora-base-url }}
      run: |
        cora review --base ${{ inputs.base-branch }} --format ${{ inputs.format }} || {
          echo "⚠️ Cora review encountered an API error — this is non-blocking"
          echo "Cora service may be temporarily unavailable."
          exit 0
        }
